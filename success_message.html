<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Message Sent - Radiant Beauty & Aesthetics Centre</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <meta content="Radiant Skin, contact confirmation, beauty centre Sabah" name="keywords">
    <meta content="Your message has been sent to Radiant Beauty & Aesthetics Centre. We will get back to you as soon as possible." name="description">

    <!-- Open Graph / Social -->
    <meta property="og:title" content="Thank You - Radiant Beauty & Aesthetics Centre">
    <meta property="og:description" content="Your message has been sent. We'll get back to you soon!">
    <meta property="og:image" content="img/rdskin-logo.png">
    <meta property="og:url" content="https://www.myradiantskin.com.my/success_message.html">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <link rel="canonical" href="https://www.myradiantskin.com.my/success_message.html">
    <link href="img/rs-only.ico" rel="icon">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
    <style>
        :root {
            --spa-primary: #B88A62;
            --spa-primary-hover: #A67850;
            --spa-dark: #2D2B29;
            --spa-secondary: #77706A;
            --spa-bg: #FAF8F5;
        }
        body {
            background: var(--spa-bg);
            font-family: 'Poppins', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .success-card {
            background: #fff;
            border-radius: 24px;
            box-shadow: 0 4px 30px rgba(45, 43, 41, 0.06);
            padding: 60px 40px;
            text-align: center;
            max-width: 480px;
            width: 100%;
        }
        .success-card .icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #E8F5E9;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
        }
        .success-card .icon i {
            font-size: 36px;
            color: #4CAF50;
        }
        .success-card h1 {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 1.8rem;
            font-weight: 600;
            color: var(--spa-dark);
            margin-bottom: 12px;
        }
        .success-card p {
            font-size: 1rem;
            font-weight: 300;
            color: var(--spa-secondary);
            line-height: 1.7;
            margin-bottom: 32px;
        }
        .success-card .btn {
            display: inline-block;
            padding: 14px 36px;
            border-radius: 50px;
            font-family: 'Poppins', sans-serif;
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 1px;
            text-transform: uppercase;
            background: var(--spa-primary);
            color: #fff;
            text-decoration: none;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
        }
        .success-card .btn:hover {
            background: var(--spa-primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(184, 138, 98, 0.25);
        }
        @media (max-width: 480px) {
            .success-card { padding: 40px 24px; }
            .success-card h1 { font-size: 1.4rem; }
        }
    </style>
</head>

<body>
    <div class="success-card">
        <div class="icon">
            <i class="fa fa-check"></i>
        </div>
        <h1>Thank You!</h1>
        <p>Your message has been sent successfully. We'll get back to you as soon as possible.</p>
        <a href="index.html" class="btn">Back to Home</a>
    </div>
</body>

</html>
